<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bồ câu & Đồng hồ trời chiều</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --sky-top:#16213e;
    --sky-mid:#5c4a7a;
    --sky-horizon:#e08a5b;
    --sky-glow:#f6c667;
    --cream:#f5ecd9;
    --gold:#f2c14e;
    --gold-deep:#c8872b;
    --ink:#1b2a4a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; overflow:hidden;}
  body{
    font-family:'Georgia','Times New Roman',serif;
    background:var(--ink);
  }

  /* ---------- LOADING PAGE ---------- */
  #loading{
    position:fixed; inset:0; z-index:100;
    background:linear-gradient(180deg,#0f1730 0%, #2c2350 55%, #6b4a63 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:opacity 1s ease, visibility 1s ease;
  }
  #loading.hide{opacity:0; visibility:hidden; pointer-events:none;}
  .load-dove{
    width:70px; height:70px;
    animation:loadFly 1.6s ease-in-out infinite;
    filter:drop-shadow(0 0 10px rgba(246,198,103,0.5));
  }
  @keyframes loadFly{
    0%,100%{transform:translateY(0) rotate(-3deg);}
    50%{transform:translateY(-14px) rotate(3deg);}
  }
  .load-text{
    margin-top:22px; color:var(--cream); letter-spacing:3px;
    font-size:13px; text-transform:uppercase; opacity:.85;
  }
  .load-bar{
    margin-top:18px; width:200px; height:3px; border-radius:3px;
    background:rgba(245,236,217,0.15); overflow:hidden;
  }
  .load-bar::after{
    content:''; display:block; height:100%; width:40%;
    background:linear-gradient(90deg, var(--gold-deep), var(--gold));
    animation:loadBar 1.2s ease-in-out infinite;
  }
  @keyframes loadBar{
    0%{transform:translateX(-100%);}
    100%{transform:translateX(350%);}
  }

  /* ---------- SKY SCENE ---------- */
  #scene{
    position:relative; width:100%; height:100vh;
    background:
      radial-gradient(120% 60% at 50% 100%, var(--sky-glow) 0%, var(--sky-horizon) 28%, transparent 60%),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-horizon) 100%);
    overflow:hidden;
  }

  .star{
    position:absolute; width:2px; height:2px; background:#fff; border-radius:50%;
    opacity:.7; animation:twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{0%,100%{opacity:.15;}50%{opacity:.9;}}

  .cloud{
    position:absolute; opacity:.5;
    animation:drift linear infinite;
  }
  .cloud svg{width:100%; height:100%; display:block;}
  @keyframes drift{
    from{transform:translateX(-20vw);}
    to{transform:translateX(120vw);}
  }

  /* ---------- CLOCK ---------- */
  #clock-wrap{
    position:absolute; top:8%; left:50%; transform:translateX(-50%);
    width:min(30vw,220px); height:min(30vw,220px);
    filter:drop-shadow(0 0 25px rgba(246,198,103,0.35));
  }
  #clock-wrap svg{width:100%; height:100%;}
  .clock-face{fill:rgba(245,236,217,0.08); stroke:var(--cream); stroke-width:2;}
  .clock-tick{stroke:var(--cream); stroke-width:1.5; opacity:.6;}
  .hand{stroke-linecap:round;}
  .hand-hour{stroke:var(--cream); stroke-width:5;}
  .hand-min{stroke:var(--cream); stroke-width:3.5;}
  .hand-sec{stroke:var(--gold); stroke-width:1.8;}
  .clock-center{fill:var(--gold);}
  #digital-time{
    text-align:center; margin-top:8px; color:var(--cream);
    letter-spacing:2px; font-size:13px; opacity:.85;
  }

  /* ---------- DOVE ---------- */
  #dove{
    position:absolute; width:min(20vw,150px);
    top:40%; left:-25%;
    animation:fly 16s linear infinite;
  }
  @keyframes fly{
    0%{left:-25%; top:46%; transform:scale(0.85) rotate(0deg);}
    45%{left:55%; top:22%; transform:scale(1.05) rotate(-4deg);}
    55%{left:65%; top:20%; transform:scale(1.05) rotate(2deg);}
    100%{left:125%; top:34%; transform:scale(0.85) rotate(0deg);}
  }
  .wing-back{transform-origin:78px 58px; animation:flapBack 0.65s ease-in-out infinite;}
  .wing-front{transform-origin:78px 58px; animation:flapFront 0.65s ease-in-out infinite;}
  @keyframes flapBack{
    0%,100%{transform:rotate(6deg);}
    50%{transform:rotate(-26deg);}
  }
  @keyframes flapFront{
    0%,100%{transform:rotate(-4deg);}
    50%{transform:rotate(-30deg);}
  }
  .tail{transform-origin:20px 62px; animation:tailWag 1.3s ease-in-out infinite;}
  @keyframes tailWag{
    0%,100%{transform:rotate(-2deg);}
    50%{transform:rotate(3deg);}
  }

  /* ---------- FOOTER / DOWNLOAD ---------- */
  #footer{
    position:absolute; bottom:6%; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:10px;
    text-align:center; z-index:5;
  }
  #caption{
    color:var(--cream); font-size:14px; letter-spacing:1px; opacity:.8;
    max-width:320px;
  }

  .shine-btn{
    position:relative; overflow:hidden;
    display:inline-flex; align-items:center; gap:10px;
    padding:16px 34px;
    font-family:'Georgia',serif; font-size:16px; font-weight:bold; letter-spacing:1px;
    color:var(--ink);
    background:linear-gradient(120deg, var(--gold-deep), var(--gold) 40%, #fff6da 50%, var(--gold) 60%, var(--gold-deep));
    background-size:300% 100%;
    border:none; border-radius:40px;
    text-decoration:none;
    cursor:pointer;
    box-shadow:0 8px 24px rgba(242,193,78,0.4), 0 0 0 1px rgba(255,255,255,0.3) inset;
    animation:shine 3s linear infinite;
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .shine-btn:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 12px 30px rgba(242,193,78,0.55), 0 0 0 1px rgba(255,255,255,0.4) inset;
  }
  @keyframes shine{
    0%{background-position:0% 0%;}
    100%{background-position:300% 0%;}
  }
  .shine-btn .spark{
    font-size:18px; animation:sparkle 1.4s ease-in-out infinite;
  }
  @keyframes sparkle{
    0%,100%{opacity:.6; transform:scale(1);}
    50%{opacity:1; transform:scale(1.3);}
  }
  #sub-note{
    color:var(--cream); font-size:11px; opacity:.55; letter-spacing:.5px;
  }
</style>
</head>
<body>

<!-- LOADING PAGE -->
<div id="loading">
  <svg class="load-dove" viewBox="0 0 100 100">
    <path d="M50 20 C40 10, 15 15, 5 30 C20 28, 32 33, 40 42 C25 40, 12 48, 8 60 C22 55, 35 55, 42 62 C36 70, 20 72, 10 82 C28 82, 45 76, 52 65 C58 76, 75 82, 92 82 C82 72, 66 70, 60 62 C67 55, 80 55, 94 60 C90 48, 77 40, 62 42 C70 33, 82 28, 97 30 C87 15, 62 10, 52 20 C51 20, 50.5 20, 50 20 Z" fill="#f5ecd9"/>
  </svg>
  <div class="load-text">Đang dựng bầu trời...</div>
  <div class="load-bar"></div>
</div>

<!-- MAIN SCENE -->
<div id="scene">
  <div id="stars"></div>
  <div class="cloud" id="cloud1" style="top:14%; width:220px; height:70px; animation-duration:55s;">
    <svg viewBox="0 0 200 70"><path d="M20 55 Q10 30 40 30 Q45 10 75 15 Q95 0 115 20 Q150 10 155 40 Q185 40 180 60 Q180 65 170 65 L25 65 Q15 65 20 55Z" fill="#fdf7ec" opacity="0.55"/></svg>
  </div>
  <div class="cloud" id="cloud2" style="top:28%; width:150px; height:50px; animation-duration:40s; animation-delay:-10s;">
    <svg viewBox="0 0 200 70"><path d="M20 55 Q10 30 40 30 Q45 10 75 15 Q95 0 115 20 Q150 10 155 40 Q185 40 180 60 Q180 65 170 65 L25 65 Q15 65 20 55Z" fill="#fdf7ec" opacity="0.4"/></svg>
  </div>
  <div class="cloud" id="cloud3" style="top:8%; width:110px; height:38px; animation-duration:30s; animation-delay:-5s;">
    <svg viewBox="0 0 200 70"><path d="M20 55 Q10 30 40 30 Q45 10 75 15 Q95 0 115 20 Q150 10 155 40 Q185 40 180 60 Q180 65 170 65 L25 65 Q15 65 20 55Z" fill="#fdf7ec" opacity="0.5"/></svg>
  </div>

  <!-- CLOCK -->
  <div id="clock-wrap">
    <svg viewBox="0 0 200 200">
      <circle class="clock-face" cx="100" cy="100" r="92"/>
      <g id="ticks"></g>
      <line id="hourHand" class="hand hand-hour" x1="100" y1="100" x2="100" y2="55"/>
      <line id="minHand" class="hand hand-min" x1="100" y1="100" x2="100" y2="35"/>
      <line id="secHand" class="hand hand-sec" x1="100" y1="112" x2="100" y2="25"/>
      <circle class="clock-center" cx="100" cy="100" r="4.5"/>
    </svg>
  </div>
  <div id="digital-time">--:--:--</div>

  <!-- DOVE -->
  <div id="dove">
    <svg viewBox="0 0 160 110">
      <defs>
        <linearGradient id="doveBody" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="60%" stop-color="#f5ecd9"/>
          <stop offset="100%" stop-color="#e3d6ba"/>
        </linearGradient>
        <linearGradient id="doveWing" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#fdf8ee"/>
          <stop offset="100%" stop-color="#d9cba8"/>
        </linearGradient>
      </defs>

      <!-- tail feathers -->
      <g class="tail">
        <path d="M25 60 C10 66 2 74 0 84 C10 80 20 76 28 70 Z" fill="url(#doveWing)"/>
        <path d="M27 64 C14 72 8 80 6 90 C16 84 25 80 32 74 Z" fill="#e3d6ba" opacity="0.85"/>
      </g>

      <!-- back wing (behind body) -->
      <g class="wing-back">
        <path d="M78 58 C62 46 40 40 20 46 C36 48 50 54 60 64 C46 62 32 66 24 76 C38 74 52 74 62 80 C52 86 40 90 30 96 C46 94 62 88 70 80 C74 74 78 66 78 58Z" fill="url(#doveWing)"/>
      </g>

      <!-- body -->
      <ellipse cx="88" cy="62" rx="34" ry="22" fill="url(#doveBody)"/>
      <!-- chest highlight -->
      <ellipse cx="96" cy="70" rx="18" ry="12" fill="#ffffff" opacity="0.35"/>

      <!-- front wing (over body) -->
      <g class="wing-front">
        <path d="M80 58 C66 50 48 46 32 52 C46 52 58 58 66 66 C54 64 42 68 36 76 C48 74 60 76 68 82 C60 86 50 90 42 96 C56 94 70 88 76 80 C80 74 82 66 80 58Z" fill="url(#doveWing)" stroke="#d9cba8" stroke-width="0.5"/>
      </g>

      <!-- neck + head -->
      <path d="M112 52 C120 44 128 36 126 26 C124 32 118 36 112 38 C116 30 116 22 110 16 C108 24 104 30 98 34 C100 44 104 50 112 52Z" fill="url(#doveBody)"/>
      <circle cx="122" cy="30" r="12" fill="url(#doveBody)"/>

      <!-- neck iridescent sheen -->
      <path d="M108 40 C112 44 118 44 122 40" stroke="#9fc9c4" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>

      <!-- eye -->
      <circle cx="126" cy="27" r="2.3" fill="#2a2a2a"/>
      <circle cx="126.8" cy="26.2" r="0.7" fill="#fff"/>

      <!-- beak -->
      <path d="M133 29 C138 28.5 143 29.5 146 32 C142.5 33 138.5 33.5 134 33 Z" fill="#e08a5b"/>

      <!-- legs -->
      <path d="M92 82 L90 94 M90 94 L86 98 M90 94 L94 98 M90 94 L90 99" stroke="#e08a5b" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <path d="M78 84 L76 96 M76 96 L72 100 M76 96 L80 100 M76 96 L76 101" stroke="#e08a5b" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.9"/>
    </svg>
  </div>

  <!-- FOOTER -->
  <div id="footer">
    <div id="caption">Khôi phục dữ liệu đã mất — nhẹ nhàng như cánh chim câu trở về.</div>
    <a class="shine-btn" href="https://www.ccleaner.com/vi-vn/recuva/download/standard" target="_blank" rel="noopener noreferrer">
      <span class="spark">✨</span> DOWNLOAD RECUVA <span class="spark">✨</span>
    </a>
    <div id="sub-note">Tải trực tiếp từ trang chính thức ccleaner.com</div>
  </div>
</div>

<script>
  // Loading page
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('loading').classList.add('hide');
    }, 1600);
  });

  // Stars
  const starsWrap = document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s = document.createElement('div');
    s.className='star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*55+'%';
    s.style.animationDelay = (Math.random()*3)+'s';
    starsWrap.appendChild(s);
  }

  // Clock ticks
  const ticks = document.getElementById('ticks');
  for(let i=0;i<12;i++){
    const angle = i*30;
    const x1 = 100 + 82*Math.sin(angle*Math.PI/180);
    const y1 = 100 - 82*Math.cos(angle*Math.PI/180);
    const x2 = 100 + 92*Math.sin(angle*Math.PI/180);
    const y2 = 100 - 92*Math.cos(angle*Math.PI/180);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('class','clock-tick');
    ticks.appendChild(line);
  }

  // Real-time clock
  function updateClock(){
    const now = new Date();
    const h = now.getHours()%12, m = now.getMinutes(), s = now.getSeconds();
    const hourAngle = (h + m/60) * 30;
    const minAngle = (m + s/60) * 6;
    const secAngle = s * 6;
    document.getElementById('hourHand').setAttribute('transform', `rotate(${hourAngle} 100 100)`);
    document.getElementById('minHand').setAttribute('transform', `rotate(${minAngle} 100 100)`);
    document.getElementById('secHand').setAttribute('transform', `rotate(${secAngle} 100 100)`);
    document.getElementById('digital-time').textContent =
      String(now.getHours()).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
